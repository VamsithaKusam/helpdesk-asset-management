<div class="dashboard-container">
  <!-- Employee Sidebar -->
  <aside class="sidebar employee-sidebar">
    <h2>Employee Portal</h2>
    <nav>
      <ul>
       <li><a (click)="goToDashboard()" style="cursor: pointer;">Dashboard</a></li>
       <li><a (click)="goToMyAssets()" style="cursor: pointer;">My Assigned Assets</a></li>
        <li><a (click)="goToTickets()">My Tickets</a></li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header>
      <h1>Welcome, {{ employeeName }}</h1>
    <button class="logout-btn" (click)="logout()">Logout</button>
    </header>

    <section class="stats-grid">
      <div style="max-width: 1000px; margin: auto; padding-top: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  
  <div style="border-bottom: 3px solid var(--vc-orange); margin-bottom: 30px; padding-bottom: 10px;">
    <h2 style="color: var(--vc-navy); margin: 0; font-size: 2em;">Welcome, {{ employeeName || 'Employee' }}</h2>
  </div>

  <div style="display: flex; gap: 30px; margin-top: 20px;">
    <div style="background: white; padding: 30px; border-radius: 8px; flex: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 5px solid var(--vc-navy); text-align: center;">
      <h3 style="color: #666; margin-top: 0; text-transform: uppercase; font-size: 1.1em; letter-spacing: 1px;">My Active Tickets</h3>
      <p style="font-size: 3.5em; font-weight: bold; color: var(--vc-navy); margin: 15px 0;">{{ myActiveTickets || 0 }}</p>
    </div>
    
    <div style="background: white; padding: 30px; border-radius: 8px; flex: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 5px solid var(--vc-orange); text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center;">
      <h3 style="color: #666; margin-top: 0; text-transform: uppercase; font-size: 1.1em; letter-spacing: 1px;">Need IT Help?</h3>
      <button (click)="goToCreateTicket()" style="background: var(--vc-orange); color: white; border: none; padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1.1em; margin-top: 15px; text-transform: uppercase;">Create New Ticket</button>
    </div>
  </div>
</div>
    </section>
  </main>
</div>
