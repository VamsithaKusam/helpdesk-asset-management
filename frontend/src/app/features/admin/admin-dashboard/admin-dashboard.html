<div class="dashboard-container">
  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <h2>Helpdesk Admin</h2>
    <nav>
      <ul>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Manage Assets</a></li>
        <li><a (click)="goToAdminTickets()">Helpdesk Tickets</a></li>
        <li><a href="#">User Roles</a></li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <header>
      <h1>Welcome back, {{ adminName }}</h1>
     <button class="logout-btn" (click)="logout()">Logout</button>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <h3>Total Assets</h3>
        <p class="stat-number">{{ totalAssets }}</p>
      </div>
      <div class="stat-card">
        <h3>Pending Tickets</h3>
        <p class="stat-number">{{ pendingTickets }}</p>
      </div>
    </section>
  </main>
</div>
