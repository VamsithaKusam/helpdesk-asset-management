<div class="ticket-list">
  <h2>My Tickets</h2>

  <!-- 1. The async pipe subscribes to the data and unwraps it -->
  <ng-container *ngIf="tickets$ | async as tickets">
    
    <!-- 2. Show this if the array is empty -->
    <div *ngIf="tickets.length === 0">
      No tickets found
    </div>

    <!-- 3. Loop through the unwrapped tickets array -->
    <div *ngFor="let ticket of tickets" class="ticket-card">
      <h3>{{ ticket.title }}</h3>
      <p>{{ ticket.description }}</p>
      
      <!-- Priority will now officially show up! -->
      <span>Priority: {{ ticket.priority }}</span>
      <br>
      <span>Status: {{ ticket.status }}</span>
    </div>

  </ng-container>
</div>
